name: Feature request
description: Propose a new capability, adapter, or workflow
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What research or Zotero workflow is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the feature or integration you want
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Why would this help users or make the repo more useful?

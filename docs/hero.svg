<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Zotero Researcher MCP</title>
  <desc id="desc">MCP server for academic discovery, deep PDF reading, and Zotero syncing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081C2E"/>
      <stop offset="0.55" stop-color="#123A58"/>
      <stop offset="1" stop-color="#E6A53A"/>
    </linearGradient>
    <linearGradient id="card" x1="220" y1="86" x2="1000" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="180" y="60" width="920" height="520" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#02101E" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1115" cy="118" r="160" fill="#F7C56A" fill-opacity="0.18"/>
  <circle cx="164" cy="552" r="210" fill="#0F5B78" fill-opacity="0.28"/>
  <circle cx="1022" cy="540" r="115" fill="#FFFFFF" fill-opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="220" y="86" width="840" height="468" rx="28" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.16"/>
  </g>

  <text x="286" y="180" fill="#9DD3FF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="2">ACADEMIC AGENT TOOLING</text>
  <text x="286" y="258" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="800">Zotero Researcher MCP</text>
  <text x="286" y="314" fill="#E8F2FA" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500">Search papers. Read PDFs deeply. Sync results to Zotero.</text>

  <g transform="translate(286 384)">
    <rect width="188" height="54" rx="27" fill="#F0B24A"/>
    <text x="94" y="34" text-anchor="middle" fill="#10263A" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">OpenAlex</text>
  </g>
  <g transform="translate(494 384)">
    <rect width="244" height="54" rx="27" fill="#FFFFFF"/>
    <text x="122" y="34" text-anchor="middle" fill="#10263A" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">Semantic Scholar</text>
  </g>
  <g transform="translate(758 384)">
    <rect width="130" height="54" rx="27" fill="#BCE7FF"/>
    <text x="65" y="34" text-anchor="middle" fill="#10263A" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">arXiv</text>
  </g>

  <g transform="translate(286 468)">
    <circle cx="13" cy="13" r="13" fill="#6BDAA3"/>
    <text x="38" y="20" fill="#F5FBFF" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600">OA PDF resolution</text>
    <circle cx="292" cy="13" r="13" fill="#6BDAA3"/>
    <text x="317" y="20" fill="#F5FBFF" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600">Page rendering</text>
    <circle cx="524" cy="13" r="13" fill="#6BDAA3"/>
    <text x="549" y="20" fill="#F5FBFF" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600">Local Zotero sync</text>
  </g>
</svg>
